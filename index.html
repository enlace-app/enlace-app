<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>ENLACE v14</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    :root { --bg:#0A0A0F; --s1:#12121A; --s2:#1A1A26; --acc:#E8356D; --txt:#F0F0FF; }
    body { margin:0; background:var(--bg); color:var(--txt); font-family:'DM Sans', sans-serif; overflow:hidden; height:100vh; }
    #splash { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
    .logo-anim { font-family:'Syne', sans-serif; font-weight:800; font-size:48px; color:var(--acc); }
    .screen { position:fixed; inset:0; display:none; flex-direction:column; background:var(--bg); }
    .screen.on { display:flex; animation: fadeIn 0.4s ease; }
    header { padding:20px; display:flex; justify-content:space-between; align-items:center; }
    .xp-badge { background:rgba(232,53,109,0.15); color:var(--acc); padding:6px 14px; border-radius:20px; font-size:12px; font-weight:700; border:1px solid rgba(232,53,109,0.3); }
    .btn-main { background:var(--acc); color:white; border:none; padding:18px; border-radius:18px; font-weight:700; width:100%; cursor:pointer; }
    input { background:var(--s2); border:1px solid rgba(255,255,255,0.05); padding:16px; border-radius:16px; color:white; margin:10px 0; width:100%; box-sizing:border-box; }
    .nav { position:fixed; bottom:0; width:100%; height:85px; background:rgba(18,18,26,0.9); backdrop-filter:blur(15px); display:none; justify-content:space-around; align-items:center; border-top:1px solid rgba(255,255,255,0.05); padding-bottom:env(safe-area-inset-bottom); }
    .nav.on { display:flex; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

    <div id="splash">
        <h1 class="logo-anim">ENLACE</h1>
        <div style="width:25px;height:25px;border:3px solid #222;border-top-color:var(--acc);border-radius:50%;animation:spin 1s linear infinite;margin-top:20px"></div>
    </div>

    <div id="auth" class="screen" style="justify-content:center; align-items:center; padding:20px;">
        <div style="width:100%; max-width:400px; text-align:center;">
            <h1 style="font-family:Syne; font-size:32px;">Bienvenido</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Contraseña">
            <button class="btn-main" onclick="doAuth('login')">ENTRAR</button>
            <button onclick="doAuth('reg')" style="background:none; border:none; color:#666; margin-top:20px">Crear cuenta nueva</button>
            <p id="err" style="color:var(--acc); font-size:12px; margin-top:20px"></p>
        </div>
    </div>

    <div id="main" class="screen">
        <header>
            <span style="font-family:Syne; font-weight:800; color:var(--acc); font-size:22px">ENLACE</span>
            <div class="xp-badge" id="xp-val">0 XP</div>
        </header>
        <div id="feed" style="flex:1; display:flex; align-items:center; justify-content:center; padding:20px">
            <div style="background:var(--s2); width:100%; height:80%; border-radius:35px; display:flex; align-items:center; justify-content:center; border:1px solid rgba(255,255,255,0.05)">
                <p style="color:#444">Buscando personas...</p>
            </div>
        </div>
    </div>

    <nav id="navbar" class="nav">
        <div onclick="show('main')" style="font-size:28px">🔥</div>
        <div style="font-size:28px; opacity:0.3">💬</div>
        <div style="font-size:28px; opacity:0.3">👤</div>
    </nav>

<script>
    // ═══ CONFIGURACIÓN LIMPIA ═══
    const SB_URL = "https://nvvebzpbupqrddxcvnzk.supabase.co";
    const SB_KEY = "Sb_publishable_DHkfYtA89Cb-MAIdq2TqqA_OVjmtvuq";
    
    // Inicialización con manejo de errores
    let sb;
    try {
        sb = supabase.createClient(SB_URL, SB_KEY);
    } catch (e) {
        console.error("Error crítico inicializando Supabase:", e);
    }

    async function start() {
        const timer = setTimeout(() => { exitSplash(); show('auth'); }, 2000);
        try {
            const { data: { session }, error } = await sb.auth.getSession();
            if (error) throw error;
            
            clearTimeout(timer);
            exitSplash();
            if (session) {
                loadProfile(session.user.id);
                show('main');
            } else {
                show('auth');
            }
        } catch (e) {
            console.warn("Fallo en sesión:", e.message);
            exitSplash();
            show('auth');
        }
    }

    function exitSplash() {
        const s = document.getElementById('splash');
        if(s) { s.style.opacity = '0'; setTimeout(() => s.style.display = 'none', 500); }
    }

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
        document.getElementById(id).classList.add('on');
        document.getElementById('navbar').classList.toggle('on', id === 'main');
    }

    async function loadProfile(uid) {
        const { data } = await sb.from('perfiles').select('puntos').eq('id', uid).single();
        if(data) document.getElementById('xp-val').innerText = (data.puntos || 0) + ' XP';
    }

    async function doAuth(type) {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const err = document.getElementById('err');
        err.innerText = "Verificando...";

        const { error } = (type === 'login') 
            ? await sb.auth.signInWithPassword({ email, password:pass })
            : await sb.auth.signUp({ email, password:pass });

        if(error) {
            err.innerText = "Error: " + error.message;
        } else {
            location.reload();
        }
    }

    window.onload = start;
</script>
</body>
</html>
