<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENLACE - Regístrate</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 420px; margin: 40px auto; padding: 20px; background: #f8f9fa; }
    h1 { text-align: center; color: #0070f3; }
    input, textarea, button { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; }
    button { background: #0070f3; color: white; font-weight: bold; border: none; cursor: pointer; }
    button:hover { background: #0051cc; }
    #message { text-align: center; margin-top: 15px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Regístrate en Enlace</h1>
  
  <form id="registerForm">
    <input type="email" id="email" placeholder="Correo electrónico" required>
    <input type="password" id="password" placeholder="Contraseña" required>
    <input type="text" id="nombre" placeholder="Nombre completo" required>
    <input type="number" id="edad" placeholder="Edad">
    <input type="text" id="ciudad" placeholder="Ciudad">
    <textarea id="bio" placeholder="Bio (opcional)" rows="3"></textarea>
    <input type="text" id="objetivo" placeholder="¿Cuál es tu objetivo?" >
    
    <button type="submit">Crear cuenta</button>
  </form>

  <p id="message"></p>

  <script>
    // ←←← CAMBIA ESTAS DOS LÍNEAS CON TUS DATOS DE SUPABASE
    const supabaseUrl = 'https://TU-PROJECT.supabase.co';
    const supabaseAnonKey = 'TU-ANON-KEY-AQUÍ';

    const supabase = Supabase.createClient(supabaseUrl, supabaseAnonKey);

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const nombre = document.getElementById('nombre').value;
      const edad = document.getElementById('edad').value;
      const ciudad = document.getElementById('ciudad').value;
      const bio = document.getElementById('bio').value;
      const objetivo = document.getElementById('objetivo').value;

      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          data: { nombre, edad, ciudad, bio, objetivo }
        }
      });

      const msg = document.getElementById('message');
      if (error) {
        msg.style.color = 'red';
        msg.textContent = '❌ Error: ' + error.message;
      } else {
        msg.style.color = 'green';
        msg.textContent = '✅ ¡Registro exitoso! Revisa tu correo para confirmar la cuenta.';
      }
    });
  </script>
</body>
</html>
