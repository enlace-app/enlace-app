<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#080810">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ENLACE — Conexiones Reales</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">

/* ── SISTEMA TESTER ── */
const T = { rating: 0, catActual: null, catRatings: {}, nps: null };

function setRating(n) {
  T.rating = n;
  document.querySelectorAll('#rating-stars span').forEach((s,i) => {
    s.style.opacity = i < n ? '1' : '.25';
    s.style.color   = i < n ? 'var(--gold)' : '';
  });
}

function toggleCat(el) {
  const cat = el.dataset.cat;
  document.querySelectorAll('.tester-cat').forEach(c => c.classList.remove('sel'));
  if (T.catActual === cat) {
    T.catActual = null;
    document.getElementById('cat-rating-panel').style.display = 'none';
  } else {
    el.classList.add('sel');
    T.catActual = cat;
    const panel = document.getElementById('cat-rating-panel');
    const labels = { diseno:'Diseño y visual', usabilidad:'Usabilidad móvil', chat:'Chat', perfiles:'Perfiles', matches:'Matches', velocidad:'Velocidad' };
    document.getElementById('cat-rating-title').textContent = 'Valora: ' + labels[cat];
    const cur = T.catRatings[cat] || 0;
    document.querySelectorAll('#cat-rating-stars span').forEach((s,i) => {
      s.style.opacity = i < cur ? '1' : '.25';
      s.style.color   = i < cur ? 'var(--gold)' : '';
    });
    panel.style.display = 'block';
    panel.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }
}

function setCatRating(n) {
  if (!T.catActual) return;
  T.catRatings[T.catActual] = n;
  document.querySelectorAll('#cat-rating-stars span').forEach((s,i) => {
    s.style.opacity = i < n ? '1' : '.25';
    s.style.color   = i < n ? 'var(--gold)' : '';
  });
  const sc = document.getElementById('cat-' + T.catActual);
  if (sc) sc.textContent = n + ' / 5';
}

function setNPS(val) {
  T.nps = val;
  const cols = { si:'rgba(0,229,160,.15)', quizas:'rgba(255,184,48,.15)', no:'rgba(255,59,92,.15)' };
  const bords = { si:'rgba(0,229,160,.4)', quizas:'rgba(255,184,48,.4)', no:'rgba(255,59,92,.4)' };
  ['si','quizas','no'].forEach(v => {
    const b = document.getElementById('nps-' + v);
    if (b) { b.style.background = v === val ? cols[val] : 'var(--bg2)'; b.style.borderColor = v === val ? bords[val] : 'var(--b1)'; }
  });
}

async function enviarFeedbackTester() {
  if (!S.user) { toast('⚠️ Debes estar registrado para enviar feedback'); return; }
  if (!T.rating) { toast('⚠️ Añade al menos una valoración general ⭐'); return; }
  const feedback = {
    usuario_id:  S.user.id,
    rating:      T.rating,
    cat_ratings: T.catRatings,
    nps:         T.nps,
    bug:         document.getElementById('tester-bug')?.value.trim() || '',
    sugerencia:  document.getElementById('tester-sug')?.value.trim() || '',
    version:     'v15',
    created_at:  new Date().toISOString()
  };
  // Guardar en Supabase (tabla feedback_tester — ver SQL)
  try {
    await sb.from('feedback_tester').insert(feedback);
    toast('🚀 Feedback enviado — ¡Gracias!');
    document.getElementById('tester-sheet')?.classList.remove('on');
    // Reset
    T.rating=0; T.catActual=null; T.catRatings={}; T.nps=null;
    setRating(0); setNPS(null);
    document.getElementById('tester-bug').value='';
    document.getElementById('tester-sug').value='';
    document.querySelectorAll('.tc-score').forEach(s=>s.textContent='– / 5');
  } catch(e) {
    // Si la tabla no existe todavía, guardar en localStorage como fallback
    const key = 'enlace_feedback_' + Date.now();
    localStorage.setItem(key, JSON.stringify(feedback));
    toast('✅ Feedback guardado localmente · Gracias');
    document.getElementById('tester-sheet')?.classList.remove('on');
  }
}
</script>

  --safe-t: env(safe-area-inset-top, 0px);

/* ── RESET ── */

.drawer-ico { width: 36px; height: 36px; border-radius: var(-
