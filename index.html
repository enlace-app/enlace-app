<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENLACE</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #0A0A0F;
  color: white;
  text-align: center;
  padding: 20px;
}
h1 { color: #E8356D; font-size: 2.5rem; }
.card {
  background: #111118;
  padding: 20px;
  border-radius: 15px;
  border: 1px solid #222;
  max-width: 400px;
  margin: 0 auto;
}
input, button {
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  width: 90%;
}
input { background: #1A1A26; color: white; border: 1px solid #333; }
button {
  background: #E8356D;
  color: white;
  font-weight: bold;
  cursor: pointer;
}
#chat {
  background: #050505;
  padding: 10px;
  margin-top: 15px;
  border-radius: 10px;
  max-height: 200px;
  overflow-y: auto;
  text-align: left;
}
#app { display:none; }
.error-msg { color: #ff4d4d; font-size: 14px; margin-top: 10px; }
</style>
</head>

<body>

<h1>🔗 ENLACE</h1>

<div id="auth" class="card">
  <input id="email" type="email" placeholder="Email"><br>
  <input id="pass" type="password" placeholder="Contraseña"><br>
  <button onclick="login()">Entrar</button>
  <button onclick="register()" style="background: #222;">Registrarse</button>
  <div id="auth-err" class="error-msg"></div>
</div>

<div id="app" class="card">
  <h2>Bienvenido 👋</h2>

  <button onclick="activarGPS()">Activar GPS 📍</button><br>

  <div style="margin: 15px 0;">
    <label style="display:block; margin-bottom:5px; font-size:14px;">Subir foto de perfil:</label>
    <input type="file" onchange="subirFoto(this.files[0])" style="background:none; border:none; width:auto;">
  </div>

  <button onclick="enviarMensaje()">Enviar mensaje 💬</button>

  <div id="chat">
    <small style="color: #444;">Bandeja de entrada...</small>
  </div>

  <button onclick="logout()" style="background: #333; margin-top: 20px;">Cerrar sesión</button>
</div>

<script>
// ═══ CONFIGURACIÓN CON TUS CLAVES REALES ═══
const supabaseUrl = "https://nvvebzpbupqrddxcvnzk.supabase.co"; //
const supabaseKey = "sb_publishable_j80UVwAIS-Va86ai1S5qbw_atZ6QTm1"; //

const db = supabase.createClient(supabaseUrl, supabaseKey);

const emailInput = document.getElementById("email");
const passInput = document.getElementById("pass");
const authDiv = document.getElementById("auth");
const appDiv = document.getElementById("app");
const chatDiv = document.getElementById("chat");
const authErr = document.getElementById("auth-err");

// LOGIN
async function login() {
  const { error } = await db.auth.signInWithPassword({
    email: emailInput.value,
    password: passInput.value
  });

  if (error) {
    authErr.innerText = error.message;
  } else {
    iniciar();
  }
}

// REGISTER
async function register() {
  const { error } = await db.auth.signUp({
    email: emailInput.value,
    password: passInput.value
  });

  if (error) {
    authErr.innerText = error.message;
  } else {
    alert("Cuenta creada correctamente");
  }
}

// LOGOUT
async function logout() {
  await db.auth.signOut();
  location.reload();
}

// START
function iniciar() {
  authDiv.style.display = "none";
  appDiv.style.display = "block";
  escucharChat();
}

// GPS
function activarGPS() {
  navigator.geolocation.getCurrentPosition(async (pos) => {
    const { data: { user } } = await db.auth.getUser();

    const { error } = await db.from("perfiles").update({
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      gps_activo: true
    }).eq("id", user.id);

    if (error) alert("Error al guardar GPS: " + error.message);
    else alert("GPS activado correctamente");
  });
}

// FOTO
async function subirFoto(file) {
  if (!file) return;
  const { data: { user } } = await db.auth.getUser();
  const path = `${user.id}/${Date.now()}.jpg`;

  const { data, error } = await db.storage
    .from("fotos")
    .upload(path, file);

  if (error) return alert("Error al subir foto: " + error.message);

  const { data: urlData } = db.storage
    .from("fotos")
    .getPublicUrl(path);

  await db.from("perfiles").update({
    foto_url: urlData.publicUrl
  }).eq("id", user.id);

  alert("Foto de perfil actualizada");
}

// MENSAJE
async function enviarMensaje() {
  const { data: { user } } = await db.auth.getUser();

  const { data: match } = await db
    .from("matches")
    .select("id")
    .limit(1)
    .single();

  if (!match) return alert("Aún no tienes ningún match para enviar mensajes.");

  await db.from("mensajes").insert({
    match_id: match.id,
    emisor_id: user.id,
    contenido: "Hola desde ENLACE 👋"
  });
}

// REALTIME
function escucharChat() {
  db.channel("chat")
    .on("postgres_changes", {
      event: "INSERT",
      schema: "public",
      table: "mensajes"
    }, (payload) => {
      const p = document.createElement("p");
      p.style.margin = "5px 0";
      p.style.fontSize = "14px";
      p.innerHTML = `<b style="color: #E8356D;">Nuevo:</b> ${payload.new.contenido}`;
      chatDiv.appendChild(p);
      chatDiv.scrollTop = chatDiv.scrollHeight;
    })
    .subscribe();
}

// AUTO LOGIN
db.auth.getSession().then(({ data }) => {
  if (data.session) iniciar();
});
</script>

</body>
</html>
