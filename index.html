<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>ENLACE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    /* Recupero tu Diseño Original */
    :root {
      --bg:#0A0A0F; --s1:#12121A; --s2:#1A1A26; --acc:#E8356D; --txt:#F0F0FF;
    }
    body { margin:0; background:var(--bg); color:var(--txt); font-family:'DM Sans', sans-serif; overflow:hidden; }
    
    /* Splash con tu Logo Original */
    #splash { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition:0.5s; }
    .logo-anim { font-family:'Syne', sans-serif; font-weight:800; font-size:48px; letter-spacing:-2px; color:var(--acc); margin:0; }
    
    .screen { position:fixed; inset:0; display:none; flex-direction:column; padding-top:env(safe-area-inset-top); }
    .screen.on { display:flex; }

    /* Estilos de tus botones y XP */
    .xp-badge { background:rgba(232,53,109,0.15); color:var(--acc); padding:4px 12px; border-radius:20px; font-weight:600; font-size:12px; border:1px solid rgba(232,53,109,0.3); }
    .btn-main { background:var(--acc); color:white; border:none; padding:16px; border-radius:16px; font-weight:700; width:100%; cursor:pointer; }
    
    input { background:var(--s2); border:1px solid rgba(255,255,255,0.1); padding:16px; border-radius:16px; color:white; margin:8px 0; width:90%; }
    
    .nav { position:fixed; bottom:0; width:100%; height:85px; background:rgba(10,10,15,0.8); backdrop-filter:blur(20px); display:none; justify-content:space-around; align-items:center; border-top:1px solid rgba(255,255,255,0.05); padding-bottom:env(safe-area-inset-bottom); }
    .nav.on { display:flex; }
</style>
</head>
<body>

    <div id="splash">
        <h1 class="logo-anim">ENLACE</h1>
        <div id="loader" style="width:20px; height:20px; border:2px solid #333; border-top-color:var(--acc); border-radius:50%; animation:spin 1s linear infinite; margin-top:20px"></div>
    </div>

    <div id="auth" class="screen" style="justify-content:center; align-items:center;">
        <h2 style="font-family:Syne">Empieza algo real</h2>
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="pass" placeholder="Contraseña">
        <button class="btn-main" style="width:90%" onclick="handleAuth('login')">ENTRAR</button>
        <button onclick="handleAuth('reg')" style="background:none; border:none; color:#888; margin-top:15px">Crear cuenta nueva</button>
        <p id="err" style="color:var(--acc); font-size:12px; margin-top:10px"></p>
    </div>

    <div id="main" class="screen">
        <header style="padding:20px; display:flex; justify-content:space-between; align-items:center">
            <span style="font-family:Syne; font-weight:800; color:var(--acc); font-size:20px">ENLACE</span>
            <div class="xp-badge" id="user-xp">0 XP</div>
        </header>
        <div id="feed" style="flex:1; display:flex; align-items:center; justify-content:center; padding:20px">
            <div style="background:var(--s2); width:100%; height:100%; border-radius:32px; display:flex; align-items:center; justify-content:center; border:1px solid rgba(255,255,255,0.05)">
                <p style="color:#555">Buscando perfiles cerca...</p>
            </div>
        </div>
    </div>

    <nav id="navbar" class="nav">
        <div onclick="show('main')">🔥</div>
        <div onclick="alert('Chat')">💬</div>
        <div onclick="alert('Perfil')">👤</div>
    </nav>

<script>
    // TUS CLAVES INTEGRADAS
    const SB_URL = "https://nvvebzpbupqrddxcvnzk.supabase.co";
    const SB_KEY = "Sb_publishable_DHkfYtA89Cb-MAIdq2TqqA_OVjmtvuq";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    async function startApp() {
        // El truco para que no se quede pensando: forzamos el cierre del splash a los 3 seg
        const timer = setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                show('auth');
            }, 500);
        }, 3000);

        try {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                clearTimeout(timer);
                document.getElementById('splash').style.display = 'none';
                show('main');
            }
        } catch (e) {
            console.error(e);
        }
    }

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
        document.getElementById(id).classList.add('on');
        if(id === 'main') document.getElementById('navbar').classList.add('on');
        else document.getElementById('navbar').classList.remove('on');
    }

    async function handleAuth(type) {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const err = document.getElementById('err');
        
        err.innerText = "Conectando...";
        const { error } = (type === 'login') 
            ? await sb.auth.signInWithPassword({ email, password:pass })
            : await sb.auth.signUp({ email, password:pass });

        if(error) err.innerText = error.message;
        else location.reload();
    }

    @keyframes spin { to { transform:rotate(360deg); } }
    window.onload = startApp;
</script>
</body>
</html>
