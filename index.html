<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>ENLACE - V17</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg:#0A0A0F; --acc:#E8356D; --txt:#F0F0FF; --s2:#1A1A26; }
        body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--txt); overflow:hidden; }
        .screen { position:fixed; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; padding:20px; text-align:center; z-index: 10; }
        .screen.on { display:flex; }
        #splash { background:var(--bg); z-index:1000; }
        input { width:85%; padding:15px; margin:10px 0; border-radius:12px; border:1px solid #333; background:var(--s2); color:#fff; font-size:16px; }
        button { background:var(--acc); color:white; border:none; padding:16px; border-radius:50px; font-weight:bold; width:90%; cursor:pointer; font-size:16px; margin-top:10px; }
        .nav { position:fixed; bottom:0; width:100%; height:80px; background:#12121A; display:none; justify-content:space-around; align-items:center; border-top:1px solid #222; z-index: 500; }
        .nav.on { display:flex; }
        .loader { width: 30px; height: 30px; border: 3px solid #333; border-top: 3px solid var(--acc); border-radius: 50%; animation: spin 1s linear infinite; margin-top:20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="splash" class="screen on">
        <h1 style="letter-spacing:8px; color:var(--acc)">ENLACE</h1>
        <div class="loader"></div>
        <p style="margin-top:20px; font-size:12px; color:#555">CONECTANDO...</p>
    </div>

    <div id="auth" class="screen">
        <h1 style="color:var(--acc)">ENLACE</h1>
        <p style="color:#888; margin-bottom:20px">Conexiones reales en España</p>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Contraseña (mín. 6)">
        <button onclick="auth('login')">ENTRAR</button>
        <button onclick="auth('reg')" style="background:none; border:1px solid #444">CREAR CUENTA</button>
        <p id="err" style="color:#E8356D; font-size:12px; margin-top:15px"></p>
    </div>

    <div id="main" class="screen">
        <h2 style="position:absolute; top:20px">Descubrir</h2>
        <div style="background:var(--s2); width:100%; height:60vh; border-radius:25px; display:flex; align-items:center; justify-content:center; border:1px solid #222">
            <p style="color:#666">Buscando personas...</p>
        </div>
    </div>

    <nav id="navbar" class="nav">
        <span onclick="show('main')" style="font-size:25px">🔥</span>
        <span onclick="alert('Chat próximamente')" style="font-size:25px">💬</span>
        <span onclick="alert('Perfil próximamente')" style="font-size:25px">👤</span>
    </nav>

    <script>
        const SB_URL = "https://nvvebzpbupqrddxcvnzk.supabase.co";
        const SB_KEY = "Sb_publishable_DHkfYtA89Cb-MAIdq2TqqA_OVjmtvuq";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function init() {
            // SALVAVIDAS: Si en 3 segundos no hay respuesta de Supabase, forzamos LOGIN
            const failSafe = setTimeout(() => {
                if(document.getElementById('splash').classList.contains('on')) {
                    console.log("Failsafe activado: Forzando UI de Auth");
                    show('auth');
                }
            }, 3000);

            try {
                const { data: { session } } = await sb.auth.getSession();
                clearTimeout(failSafe);
                if (session) show('main'); else show('auth');
            } catch (e) {
                show('auth');
            }
        }

        function show(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
            document.getElementById('splash').classList.remove('on');
            document.getElementById(id).classList.add('on');
            if(id === 'main') document.getElementById('navbar').classList.add('on');
            else document.getElementById('navbar').classList.remove('on');
        }

        async function auth(type) {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const err = document.getElementById('err');
            if(!email || pass.length < 6) { err.innerText = "Email o contraseña corta"; return; }
            
            err.innerText = "Procesando...";
            const { error } = (type === 'login') 
                ? await sb.auth.signInWithPassword({ email, password:pass })
                : await sb.auth.signUp({ email, password:pass });

            if(error) err.innerText = error.message;
            else init();
        }

        window.onload = init;
    </script>
</body>
</html>
