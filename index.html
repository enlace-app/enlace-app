<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENLACE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { font-family: Arial, sans-serif; background: #0A0A0F; color: white; text-align: center; padding: 20px; }
  h1 { color: #E8356D; }
  .card { background: #111; padding: 20px; border-radius: 15px; max-width: 400px; margin: 0 auto; border: 1px solid #222; }
  input, button { padding: 12px; margin: 8px 0; border-radius: 10px; border: none; width: 90%; }
  input { background: #1A1A26; color: white; }
  button { background: #E8356D; color: white; font-weight: bold; cursor: pointer; }
  #app { display:none; }
  .err { color: #E8356D; font-size: 14px; margin-top: 10px; }
</style>
</head>
<body>

<h1>🔗 ENLACE</h1>

<div id="auth" class="card">
  <input id="email" type="email" placeholder="Email" value="hispanointer@gmail.com">
  <input id="pass" type="password" placeholder="Contraseña">
  <button onclick="login()">ENTRAR</button>
  <button onclick="register()" style="background:#222">Registrarse</button>
  <div id="msg" class="err"></div>
</div>

<div id="app" class="card">
  <h2>Bienvenido 👋</h2>
  <button onclick="activarGPS()">📍 Activar GPS</button>
  <button onclick="logout()" style="background:#222; margin-top:20px;">Cerrar sesión</button>
</div>

<script>
// ═══ CONFIGURACIÓN FINAL ═══
const SB_URL = "https://nvvebzpbupqrddxcvnzk.supabase.co";
const SB_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52dmVienBidXBxcmRkeGN2bnprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5Nzk4NzUsImV4cCI6MjA5MTU1NTg3NX0.5Zk-Y_6tZVKuvVj6Xxwh1gZT9ZRRU3rKI-7bw8nsEcY";

const db = supabase.createClient(SB_URL, SB_KEY);

async function login() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;
  const msg = document.getElementById("msg");
  
  const { error } = await db.auth.signInWithPassword({ email, password: pass });
  if (error) msg.innerText = error.message;
  else showApp();
}

async function register() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;
  const { error } = await db.auth.signUp({ email, password: pass });
  if (error) alert(error.message);
  else alert("Registro completado. Verifica tu email.");
}

function showApp() {
  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";
}

async function logout() {
  await db.auth.signOut();
  location.reload();
}

async function activarGPS() {
  navigator.geolocation.getCurrentPosition(async (pos) => {
    const { data: { user } } = await db.auth.getUser();
    await db.from("perfiles").update({
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      gps_activo: true
    }).eq("id", user.id);
    alert("📍 Ubicación actualizada.");
  });
}

db.auth.getSession().then(({ data }) => {
  if (data.session) showApp();
});
</script>
</body>
</html>
