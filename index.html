<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENLACE</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: #0A0A0F;
  color: white;
  text-align: center;
  padding: 20px;
}
input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}
button {
  background: #E8356D;
  color: white;
}
</style>
</head>

<body>

<h1>🔗 ENLACE</h1>

<div id="auth">
  <input id="email" placeholder="Email"><br>
  <input id="pass" type="password" placeholder="Contraseña"><br>
  <button onclick="login()">Entrar</button>
  <button onclick="register()">Registrarse</button>
</div>

<div id="app" style="display:none;">
  <h2>Bienvenido</h2>
  <button onclick="activarGPS()">Activar GPS</button>
  <input type="file" id="foto" onchange="subirFoto(this.files[0])"><br><br>

  <button onclick="enviarMensaje()">Enviar mensaje test</button>

  <div id="chat"></div>

  <button onclick="logout()">Cerrar sesión</button>
</div>

<script>
// 🔥 CONFIGURA ESTO
const supabaseUrl = "https://TU-PROYECTO.supabase.co";
const supabaseKey = "TU-ANON-KEY";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// LOGIN
async function login() {
  const { error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: pass.value
  });

  if (error) return alert(error.message);
  iniciarApp();
}

// REGISTRO
async function register() {
  const { error } = await supabase.auth.signUp({
    email: email.value,
    password: pass.value
  });

  if (error) return alert(error.message);
  alert("Cuenta creada");
}

// LOGOUT
async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

// INICIAR APP
async function iniciarApp() {
  auth.style.display = "none";
  app.style.display = "block";

  escucharMensajes();
}

// GPS
function activarGPS() {
  navigator.geolocation.getCurrentPosition(async (pos) => {
    const user = (await supabase.auth.getUser()).data.user;

    await supabase.from("perfiles").update({
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      gps_activo: true
    }).eq("id", user.id);

    alert("GPS activado 📍");
  });
}

// SUBIR FOTO
async function subirFoto(file) {
  const user = (await supabase.auth.getUser()).data.user;

  const { data, error } = await supabase.storage
    .from('fotos')
    .upload(`${user.id}/${Date.now()}.jpg`, file);

  if (error) return alert(error.message);

  const { data: url } = supabase.storage
    .from('fotos')
    .getPublicUrl(data.path);

  await supabase.from("perfiles").update({
    foto_url: url.publicUrl
  }).eq("id", user.id);

  alert("Foto subida 📸");
}

// MENSAJE TEST
async function enviarMensaje() {
  const user = (await supabase.auth.getUser()).data.user;

  const { data: match } = await supabase
    .from("matches")
    .select("*")
    .limit(1)
    .single();

  if (!match) return alert("No hay match");

  await supabase.from("mensajes").insert({
    match_id: match.id,
    emisor_id: user.id,
    contenido: "Hola 👋"
  });
}

// ESCUCHAR CHAT REALTIME
function escucharMensajes() {
  supabase.channel('chat')
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'mensajes'
    }, payload => {
      chat.innerHTML += "<p>" + payload.new.contenido + "</p>";
    })
    .subscribe();
}

// AUTO LOGIN
supabase.auth.getSession().then(({ data }) => {
  if (data.session) iniciarApp();
});
</script>

</body>
</html>
