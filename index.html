<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ENLACE</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{
  background:linear-gradient(180deg,#0f0f14,#141421);
  color:white;
  overflow:hidden;
}

header{
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:22px;
  background:#12121a;
  border-bottom:1px solid #1f1f2a;
}

#app{
  height:calc(100vh - 60px);
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

.card{
  width:90%;
  max-width:380px;
  height:520px;
  background:#1b1b26;
  border-radius:24px;
  overflow:hidden;
  position:absolute;
  box-shadow:0 15px 40px rgba(0,0,0,.6);
  transition:0.4s ease;
}

.card img{
  width:100%;
  height:70%;
  object-fit:cover;
}

.card-content{
  padding:18px;
}

.card h2{
  font-size:20px;
}

.card p{
  opacity:.7;
  margin-top:6px;
  font-size:14px;
}

.actions{
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:space-around;
}

.btn{
  width:65px;
  height:65px;
  border-radius:50%;
  border:none;
  font-size:24px;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,.4);
}

.like{background:#27d37f;color:white}
.dislike{background:#ff4d67;color:white}

.hidden{display:none}
</style>
</head>

<body>

<header>ENLACE</header>

<div id="app">
  <div id="cards"></div>
</div>

<script>

const SUPABASE_URL = "https://ndemndunubozvttqpxue.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kZW1uZHVudWJvenZ0dHFweHVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzkyNTcyMjAsImV4cCI6MjA1NDgzMzIyMH0.fNlqS2r_Oon2tVn_KshWclpA9S7nIn2A7lYn6Jd0-4Y";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let profiles = [];

async function init(){
  const {data:{session}} = await supabase.auth.getSession();
  if(!session){
    alert("Debes iniciar sesión");
    return;
  }
  currentUser = session.user;
  loadProfiles();
}

async function loadProfiles(){
  // Cambiado de "profiles" a "perfiles" y añadido filtro de "activo"
  const {data} = await supabase
    .from("perfiles")
    .select("*")
    .eq("activo", true)
    .neq("id", currentUser.id)
    .limit(10);

  profiles = data;
  renderCards();
}

function renderCards(){
  const container = document.getElementById("cards");
  container.innerHTML="";

  profiles.reverse().forEach(profile=>{
    const card=document.createElement("div");
    card.className="card";
    // Ajustado a "foto_url" y "nombre" que son tus campos reales
    card.innerHTML=`
      <img src="${profile.foto_url || 'https://via.placeholder.com/400'}"/>
      <div class="card-content">
        <h2>${profile.nombre}, ${profile.edad || ''}</h2>
        <p>${profile.bio || ''}</p>
      </div>
      <div class="actions">
        <button class="btn dislike">✕</button>
        <button class="btn like">❤</button>
      </div>
    `;

    card.querySelector(".like").onclick=()=>handleLike(profile.id,card);
    card.querySelector(".dislike").onclick=()=>removeCard(card);

    container.appendChild(card);
  });
}

async function handleLike(receiver, card){
  // Cambiado a tu tabla "likes" con los nombres de columna correctos (user_id y target_id)
  await supabase.from("likes").insert({
    user_id: currentUser.id,
    target_id: receiver,
    type: 'like'
  });
  removeCard(card);
}

function removeCard(card){
  card.style.transform="translateX(500px) rotate(20deg)";
  card.style.opacity="0";
  setTimeout(()=>card.remove(),300);
}

init();

</script>
</body>
</html>
