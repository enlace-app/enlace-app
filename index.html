<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0A0A0F">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ENLACE</title>
<meta name="description" content="Conexiones reales. © 2025 Javier González Rodríguez">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<link rel="manifest" href="/manifest.json">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'\">
<style>
/* ═══ DESIGN SYSTEM ═══ */
:root{
  --bg:#0A0A0F; --s1:#12121A; --s2:#1A1A26; --s3:#222232;
  --border:rgba(255,255,255,.06); --text:#F0F0FF; --muted:#666;
  --accent:#00E5FF; --accent-rgb:0,229,255;
  --grad:linear-gradient(135deg, #00E5FF 0%, #007AFF 100%);
  --font-title:'Syne', sans-serif; --font-body:'DM Sans', sans-serif;
  --safe-top:env(safe-area-inset-top); --safe-bottom:env(safe-area-inset-bottom);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);overflow:hidden;height:100vh;width:100vw;user-select:none;}
input,textarea,button{font-family:inherit;outline:none;}

/* ═══ LOADING ═══ */
#loading{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s;}
.l-logo{font-family:var(--font-title);font-weight:800;font-size:2.5rem;letter-spacing:-1px;background:var(--grad);-webkit-background-clip:text;color:transparent;margin-bottom:1rem;animation:pulse 2s infinite;}
.l-bar{width:120px;height:2px;background:var(--s3);border-radius:2px;overflow:hidden;}
.l-prog{width:40%;height:100%;background:var(--accent);animation:load 1.5s infinite ease-in-out;}
@keyframes load{0%{transform:translateX(-100%);}100%{transform:translateX(250%);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}

/* ═══ SCREENS ═══ */
.screen{position:fixed;inset:0;display:none;opacity:0;transition:opacity .4s ease;z-index:10;}
.screen.on{display:flex;flex-direction:column;opacity:1;}

/* ═══ WELCOME ═══ */
#scr-welcome{background:radial-gradient(circle at 50% -20%, #1A1A40 0%, #0A0A0F 100%);justify-content:center;align-items:center;padding:40px;text-align:center;}
.w-hero{margin-bottom:2rem;}
.w-hero h1{font-family:var(--font-title);font-size:3.5rem;font-weight:800;letter-spacing:-2px;line-height:.9;background:var(--grad);-webkit-background-clip:text;color:transparent;}
.w-tag{font-size:1.1rem;opacity:0.6;margin-top:1rem;font-weight:300;}
.w-btns{width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px;margin-top:3rem;}
.btn-main{background:var(--grad);color:white;border:none;padding:18px;border-radius:18px;font-weight:700;font-size:1rem;cursor:pointer;box-shadow:0 10px 30px rgba(0,229,255,0.2);transition:transform .2s;}
.btn-sec{background:var(--s2);color:white;border:1px solid var(--border);padding:18px;border-radius:18px;font-weight:600;font-size:1rem;cursor:pointer;}
.btn-main:active,.btn-sec:active{transform:scale(0.96);}

/* ═══ AUTH MODAL ═══ */
#scr-auth{background:rgba(0,0,0,.8);backdrop-filter:blur(20px);padding:30px;justify-content:center;}
.a-box{background:var(--s1);border:1px solid var(--border);padding:30px;border-radius:32px;width:100%;max-width:400px;margin:0 auto;}
.a-box h2{font-family:var(--font-title);font-size:2rem;margin-bottom:1rem;}
.f-group{margin-bottom:15px;text-align:left;}
.f-group label{display:block;font-size:.8rem;opacity:.5;margin-bottom:5px;margin-left:5px;}
.f-group input{width:100%;background:var(--s2);border:1px solid var(--border);padding:15px;border-radius:14px;color:white;font-size:1rem;}
.a-footer{margin-top:20px;font-size:.9rem;opacity:.6;}
.a-link{color:var(--accent);font-weight:600;text-decoration:none;}

/* ═══ SETUP ═══ */
#scr-setup{background:var(--bg);overflow-y:auto;padding:30px 20px;}
.s-header{text-align:left;margin-bottom:2rem;}
.s-header h2{font-family:var(--font-title);font-size:2.5rem;line-height:1;}
.s-photo-up{width:120px;height:120px;background:var(--s2);border:2px dashed var(--border);border-radius:35px;margin:0 auto 2rem;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;cursor:pointer;}
.s-photo-up img{width:100%;height:100%;object-fit:cover;}
.s-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:15px;}
.interest-pill{padding:10px 15px;background:var(--s2);border:1px solid var(--border);border-radius:12px;font-size:.9rem;cursor:pointer;transition:.2s;text-align:center;}
.interest-pill.on{background:var(--accent);color:black;border-color:var(--accent);font-weight:600;}

/* ═══ MAIN APP ═══ */
#scr-main{background:var(--bg);}
.main-content{flex:1;position:relative;overflow:hidden;}

/* Navbar */
.nav{height:70px;background:rgba(18,18,26,.8);backdrop-filter:blur(15px);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding-bottom:var(--safe-bottom);z-index:100;}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;opacity:.4;transition:.3s;background:none;border:none;color:white;font-size:.7rem;font-weight:600;}
.nbtn.on{opacity:1;color:var(--accent);}
.nbtn svg{width:24px;height:24px;fill:currentColor;}

/* Discovery */
#tab-desc{height:100%;padding:15px;display:flex;flex-direction:column;}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 5px 20px;}
.brand{font-family:var(--font-title);font-weight:800;font-size:1.8rem;letter-spacing:-1px;}
.brand span{color:var(--accent);}
.points-chip{background:var(--s2);padding:6px 14px;border-radius:20px;font-size:.85rem;font-weight:700;display:flex;align-items:center;gap:6px;border:1px solid var(--border);}
.points-chip span{color:var(--accent);}

.card-stack{flex:1;position:relative;perspective:1000px;}
.card{position:absolute;inset:0;background:var(--s2);border-radius:32px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 40px rgba(0,0,0,.4);transform-origin:center bottom;transition:transform .5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity .3s;}
.card-img{flex:1;position:relative;}
.card-img img{width:100%;height:100%;object-fit:cover;}
.card-img::after{content:'';position:absolute;inset:0;background:linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 40%);}
.card-info{position:absolute;bottom:0;left:0;right:0;padding:25px;pointer-events:none;}
.card-info h3{font-size:2rem;font-family:var(--font-title);margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.v-badge{background:var(--accent);color:black;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;}
.card-info p{font-size:1rem;opacity:.8;margin-bottom:10px;}
.card-tags{display:flex;gap:8px;flex-wrap:wrap;}
.tag{background:rgba(255,255,255,.1);backdrop-filter:blur(10px);padding:5px 12px;border-radius:10px;font-size:.75rem;font-weight:600;}

.card-actions{display:flex;justify-content:center;gap:20px;padding:20px 0;}
.a-btn{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;transition:.2s;box-shadow:0 8px 20px rgba(0,0,0,.2);}
.a-btn:active{transform:scale(0.85);}
.btn-nope{background:var(--s2);color:#FF4466;border:1px solid rgba(255,68,102,.2);}
.btn-like{background:var(--grad);color:white;width:74px;height:74px;}
.btn-star{background:var(--s2);color:#FFCC00;border:1px solid rgba(255,204,0,.2);}

/* Chats List */
#tab-chats{height:100%;display:flex;flex-direction:column;padding:20px;}
.chat-item{display:flex;align-items:center;gap:15px;padding:15px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.chat-avatar{width:60px;height:60px;border-radius:50%;object-fit:cover;background:var(--s2);}
.chat-body{flex:1;}
.chat-body h4{font-size:1.1rem;margin-bottom:4px;}
.chat-body p{font-size:.9rem;opacity:.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.chat-meta{text-align:right;}
.chat-time{font-size:.75rem;opacity:.4;display:block;margin-bottom:5px;}
.chat-un{background:var(--accent);color:black;font-size:.7rem;font-weight:800;padding:2px 8px;border-radius:10px;}

/* Chat Window */
#scr-chat-win{background:var(--bg);z-index:200;}
.cw-header{padding:15px 20px;display:flex;align-items:center;gap:15px;border-bottom:1px solid var(--border);background:var(--s1);}
.cw-back{background:none;border:none;color:white;padding:5px;}
.cw-user{flex:1;display:flex;align-items:center;gap:12px;}
.cw-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;}
.cw-name{font-weight:700;font-family:var(--font-title);}
.cw-msg-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px;}
.m{max-width:80%;padding:12px 16px;border-radius:20px;font-size:.95rem;line-height:1.4;position:relative;}
.m-in{background:var(--s2);align-self:flex-start;border-bottom-left-radius:4px;}
.m-out{background:var(--grad);color:white;align-self:flex-end;border-bottom-right-radius:4px;}
.m-time{font-size:.65rem;opacity:.5;margin-top:4px;display:block;text-align:right;}
.cw-input-area{padding:15px;background:var(--s1);display:flex;gap:10px;align-items:center;padding-bottom:calc(15px + var(--safe-bottom));}
.cw-input{flex:1;background:var(--s2);border:1px solid var(--border);padding:12px 18px;border-radius:25px;color:white;font-size:1rem;}
.cw-send{width:45px;height:45px;background:var(--grad);border:none;border-radius:50%;color:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* Profile */
#tab-perfil{height:100%;overflow-y:auto;padding:20px;}
.p-card{background:var(--s1);border:1px solid var(--border);border-radius:32px;padding:30px;text-align:center;margin-bottom:20px;}
.p-avatar-wrap{position:relative;width:120px;height:120px;margin:0 auto 20px;}
.p-avatar{width:100%;height:100%;border-radius:40px;object-fit:cover;border:3px solid var(--s3);}
.p-edit-btn{position:absolute;bottom:-5px;right:-5px;background:var(--accent);color:black;width:35px;height:35px;border-radius:12px;display:flex;align-items:center;justify-content:center;border:none;box-shadow:0 4px 10px rgba(0,0,0,.3);}
.p-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:25px;}
.p-stat{background:var(--s2);padding:15px;border-radius:20px;}
.p-stat b{display:block;font-size:1.2rem;color:var(--accent);}
.p-stat span{font-size:.7rem;opacity:.5;text-transform:uppercase;font-weight:700;}

.p-menu{background:var(--s1);border:1px solid var(--border);border-radius:25px;overflow:hidden;margin-bottom:80px;}
.p-item{width:100%;padding:18px 25px;display:flex;align-items:center;gap:15px;background:none;border:none;color:white;border-bottom:1px solid var(--border);font-size:1rem;font-weight:500;text-align:left;}
.p-item:last-child{border-bottom:none;}
.p-item svg{width:20px;opacity:.5;}
.p-item.logout{color:#FF4466;}

/* Modals */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
.modal.on{display:flex;}
.m-box{background:var(--s1);border:1px solid var(--border);border-radius:32px;width:100%;max-width:400px;padding:30px;position:relative;}
.m-close{position:absolute;top:20px;right:20px;background:none;border:none;color:white;opacity:.5;}

/* Toast */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.95);color:black;padding:12px 25px;border-radius:20px;font-weight:700;font-size:.9rem;z-index:10000;opacity:0;pointer-events:none;transition:.3s;white-space:nowrap;box-shadow:0 10px 30px rgba(0,0,0,.3);}
#toast.on{opacity:1;bottom:110px;}

/* Animations */
.swipe-right{transform:translateX(150%) rotate(30deg) !important;opacity:0 !important;}
.swipe-left{transform:translateX(-150%) rotate(-30deg) !important;opacity:0 !important;}

/* Matching Screen */
#scr-match{background:rgba(0,0,0,.95);z-index:500;justify-content:center;align-items:center;text-align:center;padding:40px;}
.m-avatars{display:flex;justify-content:center;margin:30px 0;}
.ma{width:120px;height:120px;border-radius:50%;border:4px solid var(--accent);object-fit:cover;box-shadow:0 0 40px rgba(0,229,255,0.3);}
.ma-1{transform:translateX(15px);z-index:2;}
.ma-2{transform:translateX(-15px);z-index:1;}
.m-title{font-family:var(--font-title);font-size:3rem;font-weight:800;color:var(--accent);margin-bottom:10px;}

/* Map Placeholder */
#map-container{width:100%;height:200px;background:var(--s2);border-radius:20px;margin:20px 0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.8rem;border:1px solid var(--border);}
</style>
</head>
<body>

<div id="loading"><div class="l-logo">ENLACE</div><div class="l-bar"><div class="l-prog"></div></div></div>

<section id="scr-welcome" class="screen">
  <div class="w-hero">
    <h1>ENLACE</h1>
    <p class="w-tag">Conexiones reales en tiempo real.</p>
  </div>
  <div class="w-btns">
    <button class="btn-main" onclick="openAuth('reg')">Crear cuenta</button>
    <button class="btn-sec" onclick="openAuth('login')">Iniciar sesión</button>
  </div>
</section>

<section id="scr-auth" class="screen">
  <div class="a-box">
    <h2 id="auth-title">HOLA</h2>
    <div class="f-group">
      <label>EMAIL</label>
      <input type="email" id="auth-email" placeholder="tu@email.com">
    </div>
    <div class="f-group">
      <label>CONTRASEÑA</label>
      <input type="password" id="auth-pass" placeholder="••••••••">
    </div>
    <button id="auth-submit" class="btn-main" style="width:100%;margin-top:10px;">Continuar</button>
    <div class="a-footer">
      <span id="auth-switch-text">¿No tienes cuenta?</span> 
      <a href="#" class="a-link" id="auth-switch-btn">Regístrate</a>
    </div>
    <button onclick="show('scr-welcome')" class="btn-sec" style="width:100%;margin-top:20px;padding:12px;font-size:.8rem;border:none;">Volver</button>
  </div>
</section>

<section id="scr-setup" class="screen">
  <div class="s-header">
    <h2>CUÉNTANOS<br><span>SOBRE TI</span></h2>
  </div>
  <div class="s-photo-up" onclick="document.getElementById('f-upload').click()">
    <img id="setup-img-prev" src="" style="display:none">
    <div id="setup-img-ph">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </div>
    <input type="file" id="f-upload" hidden accept="image/*" onchange="previewImg(this)">
  </div>
  <div class="f-group">
    <label>NOMBRE</label>
    <input type="text" id="s-nombre" placeholder="¿Cómo te llamas?">
  </div>
  <div class="s-grid">
    <div class="f-group">
      <label>EDAD</label>
      <input type="number" id="s-edad" placeholder="18-99">
    </div>
    <div class="f-group">
      <label>CIUDAD</label>
      <input type="text" id="s-ciudad" placeholder="Ej: Madrid">
    </div>
  </div>
  <div class="f-group">
    <label>BIO</label>
    <textarea id="s-bio" style="width:100%;background:var(--s2);border:1px solid var(--border);padding:15px;border-radius:14px;color:white;height:80px;resize:none;" placeholder="Algo breve sobre ti..."></textarea>
  </div>
  <div class="f-group">
    <label>BUSCO...</label>
    <div class="s-grid" style="margin-top:5px;">
      <button class="interest-pill" onclick="selObj(this,'amor')">Algo serio</button>
      <button class="interest-pill" onclick="selObj(this,'fun')">Diversión</button>
      <button class="interest-pill" onclick="selObj(this,'friends')">Amistad</button>
      <button class="interest-pill" onclick="selObj(this,'ver')">Ver qué pasa</button>
    </div>
  </div>
  <div class="f-group">
    <label>INTERESES (Elige 3)</label>
    <div id="interests-box" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:5px;">
      </div>
  </div>
  <button onclick="saveSetup()" class="btn-main" style="width:100%;margin-top:20px;">Empezar a conectar</button>
</section>

<section id="scr-main" class="screen">
  <div class="main-content">
    
    <div id="tab-desc" class="tab-pane">
      <div class="top-bar">
        <div class="brand">ENLACE<span>.</span></div>
        <div class="points-chip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--accent)"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <span id="u-puntos">0</span>
        </div>
      </div>
      
      <div class="card-stack" id="stack">
        </div>
      
      <div class="card-actions">
        <button class="a-btn btn-nope" onclick="swipe('left')">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <button class="a-btn btn-star" onclick="toast('¡Super Enlace enviado!')">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </button>
        <button class="a-btn btn-like" onclick="swipe('right')">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </button>
      </div>
    </div>

    <div id="tab-chats" class="tab-pane" style="display:none">
      <h2 style="font-family:var(--font-title);font-size:2rem;margin-bottom:20px;">MENSAJES</h2>
      <div id="chats-list" style="flex:1;overflow-y:auto;">
        </div>
    </div>

    <div id="tab-perfil" class="tab-pane" style="display:none">
      <div class="p-card">
        <div class="p-avatar-wrap">
          <img src="" class="p-avatar" id="u-foto">
          <button class="p-edit-btn" onclick="show('scr-setup')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
          </button>
        </div>
        <h2 id="u-nombre" style="font-family:var(--font-title);font-size:1.8rem;">---</h2>
        <p id="u-bio" style="opacity:.6;margin-top:8px;font-size:.9rem;line-height:1.4;">---</p>
        <div class="p-stats">
          <div class="p-stat"><b id="stat-matches">0</b><span>Matches</span></div>
          <div class="p-stat"><b id="stat-likes">0</b><span>Likes</span></div>
          <div class="p-stat"><b id="stat-puntos">0</b><span>Puntos</span></div>
        </div>
      </div>
      
      <div class="p-menu">
        <button class="p-item" onclick="compartir()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
          Invitar amigos
        </button>
        <button class="p-item" onclick="toast('Próximamente: Ajustes')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          Ajustes
        </button>
        <button class="p-item logout" onclick="cerrarSesion()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Cerrar sesión
        </button>
      </div>
    </div>

  </div>

  <nav class="nav">
    <button id="nb-desc" class="nbtn on" onclick="navGo('desc')">
      <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      Cerca
    </button>
    <button id="nb-chats" class="nbtn" onclick="navGo('chats')">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Chats
    </button>
    <button id="nb-perfil" class="nbtn" onclick="navGo('perfil')">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Perfil
    </button>
  </nav>
</section>

<section id="scr-chat-win" class="screen">
  <div class="cw-header">
    <button class="cw-back" onclick="show('scr-main')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <div class="cw-user">
      <img src="" class="cw-avatar" id="cw-img">
      <div class="cw-name" id="cw-name">---</div>
    </div>
    <button class="cw-back" onclick="reportar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
    </button>
  </div>
  <div class="cw-msg-area" id="cw-msgs">
    </div>
  <div class="cw-input-area">
    <input type="text" class="cw-input" id="cw-txt" placeholder="Escribe un mensaje...">
    <button class="cw-send" onclick="enviarMsg()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
    </button>
  </div>
</section>

<section id="scr-match" class="screen">
  <div class="m-title">¡ENLACE!</div>
  <p style="font-size:1.2rem;opacity:.8;">Habéis conectado mutuamente.</p>
  <div class="m-avatars">
    <img src="" id="ma-yo" class="ma ma-1">
    <img src="" id="ma-otro" class="ma ma-2">
  </div>
  <button class="btn-main" style="width:100%;max-width:300px;margin-bottom:12px;" onclick="irAlChatMatch()">Enviar mensaje</button>
  <button class="btn-sec" style="width:100%;max-width:300px;border:none;" onclick="show('scr-main')">Seguir buscando</button>
</section>

<div id="toast">Toast</div>

<script>
// ── CONFIGURACIÓN SUPABASE REAL ─────────────────────────────
// Claves detectadas de tu archivo original
const SB_URL = "https://ndemndunubozvttqpxue.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kZW1uZHVudWJvenZ0dHFweHVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzkyNTcyMjAsImV4cCI6MjA1NDgzMzIyMH0.fNlqS2r_Oon2tVn_KshWclpA9S7nIn2A7lYn6Jd0-4Y";
const _supabase = supabase.createClient(SB_URL, SB_KEY);

// ── ESTADO GLOBAL ─────────────────────────────────────────────
let miUsuarioId = null;
let miPerfil = null;
let currentStack = [];
let selInterests = [];
let currentChatMatchId = null;
let currentChatOtroId = null;
const allInterests = ["☕ Café", "✈️ Viajes", "🍣 Sushi", "🐕 Perros", "🎮 Gaming", "🏋️ Deporte", "🎶 Música", "📸 Foto", "🎥 Cine", "💃 Baile", "📚 Leer", "🍕 Pizza", "🎨 Arte", "🧘 Yoga", "🧗 Escalada"];

// ── INICIO ───────────────────────────────────────────────────
window.onload = async () => {
  const { data: { session } } = await _supabase.auth.getSession();
  if (session) {
    miUsuarioId = session.user.id;
    await cargarPerfil();
  } else {
    setTimeout(() => {
      document.getElementById('loading').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        show('scr-welcome');
      }, 500);
    }, 1500);
  }
  renderInterests();
};

// ── AUTH ──────────────────────────────────────────────────────
function openAuth(mode) {
  const t = document.getElementById('auth-title');
  const s = document.getElementById('auth-submit');
  const sw = document.getElementById('auth-switch-btn');
  const swt = document.getElementById('auth-switch-text');
  
  if (mode === 'login') {
    t.textContent = "HOLA DE NUEVO";
    s.textContent = "Entrar";
    swt.textContent = "¿No tienes cuenta?";
    sw.textContent = "Regístrate";
    sw.onclick = () => openAuth('reg');
    s.onclick = login;
  } else {
    t.textContent = "CREAR CUENTA";
    s.textContent = "Registrarme";
    swt.textContent = "¿Ya tienes cuenta?";
    sw.textContent = "Entra";
    sw.onclick = () => openAuth('login');
    s.onclick = registro;
  }
  show('scr-auth');
}

async function registro() {
  const email = document.getElementById('auth-email').value;
  const pass = document.getElementById('auth-pass').value;
  if (!email || !pass) return toast("Rellena los campos");
  
  const { data, error } = await _supabase.auth.signUp({ email, password: pass });
  if (error) return toast(error.message);
  
  miUsuarioId = data.user.id;
  toast("Cuenta creada");
  show('scr-setup');
}

async function login() {
  const email = document.getElementById('auth-email').value;
  const pass = document.getElementById('auth-pass').value;
  const { data, error } = await _supabase.auth.signInWithPassword({ email, password: pass });
  if (error) return toast("Error: " + error.message);
  
  miUsuarioId = data.user.id;
  await cargarPerfil();
}

async function cerrarSesion() {
  await _supabase.auth.signOut();
  location.reload();
}

// ── SETUP PERFIL ──────────────────────────────────────────────
function renderInterests() {
  const box = document.getElementById('interests-box');
  box.innerHTML = '';
  allInterests.forEach(it => {
    const btn = document.createElement('button');
    btn.className = 'interest-pill';
    btn.textContent = it;
    btn.onclick = () => {
      if (selInterests.includes(it)) {
        selInterests = selInterests.filter(x => x !== it);
        btn.classList.remove('on');
      } else {
        if (selInterests.length >= 3) return toast("Máximo 3 intereses");
        selInterests.push(it);
        btn.classList.add('on');
      }
    };
    box.appendChild(btn);
  });
}

let _selObj = 'ver';
function selObj(btn, val) {
  document.querySelectorAll('#scr-setup .interest-pill').forEach(p => {
    if (!allInterests.includes(p.textContent)) p.classList.remove('on');
  });
  btn.classList.add('on');
  _selObj = val;
}

function previewImg(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      const prev = document.getElementById('setup-img-prev');
      prev.src = e.target.result;
      prev.style.display = 'block';
      document.getElementById('setup-img-ph').style.display = 'none';
    };
    reader.readAsDataURL(input.files[0]);
  }
}

async function saveSetup() {
  const nombre = document.getElementById('s-nombre').value;
  const edad = parseInt(document.getElementById('s-edad').value);
  const ciudad = document.getElementById('s-ciudad').value;
  const bio = document.getElementById('s-bio').value;
  const file = document.getElementById('f-upload').files[0];

  if (!nombre || !edad || !ciudad || !file) return toast("Faltan datos o foto");

  toast("Subiendo perfil...");
  
  const ext = file.name.split('.').pop();
  const fName = `${miUsuarioId}_${Date.now()}.${ext}`;
  const { error: upErr } = await _supabase.storage.from('fotos').upload(fName, file);
  if (upErr) return toast("Error foto: " + upErr.message);
  
  const { data: { publicUrl } } = _supabase.storage.from('fotos').getPublicUrl(fName);

  const { error: insErr } = await _supabase.from('perfiles').upsert({
    id: miUsuarioId,
    nombre, edad, ciudad, bio,
    foto_url: publicUrl,
    intereses: selInterests,
    objetivo: _selObj,
    activo: true,
    puntos: 50
  });

  if (insErr) return toast("Error BD: " + insErr.message);
  
  await cargarPerfil();
}

// ── CARGAR DATOS (CON FILTRO DE BLOQUEO) ──────────────────────
async function cargarPerfil() {
  const { data, error } = await _supabase.from('perfiles').select('*').eq('id', miUsuarioId).single();
  
  // LOGICA DE BLOQUEO: Si el usuario no está activo, detenemos la app
  if (data && data.activo === false) {
    document.body.innerHTML = `
      <div style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#0A0A0F; color:white; text-align:center; padding:30px; font-family:sans-serif;">
        <h1 style="font-size:3rem;">🚫</h1>
        <h2 style="color:#FF4444; font-family:'Syne',sans-serif;">CUENTA SUSPENDIDA</h2>
        <p style="opacity:0.7; max-width:300px;">Tu perfil ha sido desactivado por recibir múltiples reportes de la comunidad.</p>
        <a href="mailto:soporte@tuapp.com" style="color:#00E5FF; text-decoration:none; margin-top:20px;">Contactar con soporte</a>
      </div>`;
    return;
  }

  if (error || !data) {
    document.getElementById('loading').style.display = 'none';
    return show('scr-setup');
  }

  miPerfil = data;
  
  document.getElementById('u-nombre').textContent = `${data.nombre}, ${data.edad}`;
  document.getElementById('u-bio').textContent = data.bio;
  document.getElementById('u-foto').src = data.foto_url;
  document.getElementById('u-puntos').textContent = data.puntos;
  document.getElementById('stat-puntos').textContent = data.puntos;
  
  const { count: mCount } = await _supabase.from('matches').select('*', { count: 'exact', head: true }).or(`user1_id.eq.${miUsuarioId},user2_id.eq.${miUsuarioId}`);
  document.getElementById('stat-matches').textContent = mCount || 0;

  await cargarDescubrimiento();
  
  document.getElementById('loading').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    show('scr-main');
    navGo('desc');
  }, 500);
}

// ── DESCUBRIMIENTO (CON FILTRO ACTIVO = TRUE) ─────────────────
async function cargarDescubrimiento() {
  // Filtro vital: Solo personas con activo = true
  let query = _supabase.from('perfiles').select('*').eq('activo', true).neq('id', miUsuarioId).limit(20);
  
  const { data, error } = await query;
  if (error) return;

  const { data: misLikes } = await _supabase.from('likes').select('target_id').eq('user_id', miUsuarioId);
  const idsVistos = misLikes?.map(l => l.target_id) || [];
  
  currentStack = data.filter(p => !idsVistos.includes(p.id));
  renderStack();
}

function renderStack() {
  const container = document.getElementById('stack');
  container.innerHTML = '';
  
  if (currentStack.length === 0) {
    container.innerHTML = '<div style="height:100%;display:flex;align-items:center;justify-content:center;text-align:center;opacity:.5;">No hay más perfiles cerca.<br>¡Vuelve más tarde!</div>';
    return;
  }

  currentStack.forEach((p, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.zIndex = currentStack.length - idx;
    card.style.transform = `scale(${1 - idx * 0.05}) translateY(${idx * -15}px)`;
    
    card.innerHTML = `
      <div class="card-img">
        <img src="${p.foto_url}" loading="lazy">
      </div>
      <div class="card-info">
        <h3>${p.nombre}, ${p.edad} ${p.verificado ? '<div class="v-badge">✓</div>':''}</h3>
        <p>📍 A ${Math.floor(Math.random()*10)+1} km de ti</p>
        <div class="card-tags">
          ${p.intereses.slice(0,3).map(it => `<span class="tag">${it}</span>`).join('')}
        </div>
      </div>
    `;
    container.appendChild(card);
  });
}

async function swipe(dir) {
  if (currentStack.length === 0) return;
  const card = document.querySelector('.card');
  if (!card) return;
  const userVisto = currentStack[0];
  if (dir === 'right') {
    card.classList.add('swipe-right');
    await registrarLike(userVisto.id);
  } else {
    card.classList.add('swipe-left');
    await registrarNope(userVisto.id);
  }
  setTimeout(() => {
    currentStack.shift();
    renderStack();
  }, 300);
}

async function registrarLike(targetId) {
  await _supabase.from('likes').insert({ user_id: miUsuarioId, target_id: targetId, type: 'like' });
  const { data: otroLike } = await _supabase.from('likes').select('*').eq('user_id', targetId).eq('target_id', miUsuarioId).eq('type', 'like').single();
  if (otroLike) lanzarMatch(targetId);
}

async function registrarNope(targetId) {
  await _supabase.from('likes').insert({ user_id: miUsuarioId, target_id: targetId, type: 'nope' });
}

async function lanzarMatch(otroId) {
  const { data: mData } = await _supabase.from('matches').insert({ user1_id: miUsuarioId, user2_id: otroId }).select().single();
  const { data: otroPerfil } = await _supabase.from('perfiles').eq('id', otroId).single();
  document.getElementById('ma-yo').src = miPerfil.foto_url;
  document.getElementById('ma-otro').src = otroPerfil.foto_url;
  currentChatMatchId = mData.id;
  currentChatOtroId = otroId;
  show('scr-match');
  if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
}

// ── CHATS ─────────────────────────────────────────────────────
async function cargarMatches() {
  const { data, error } = await _supabase.from('matches')
    .select(`id, created_at, user1:perfiles!user1_id(id, nombre, foto_url), user2:perfiles!user2_id(id, nombre, foto_url)`)
    .or(`user1_id.eq.${miUsuarioId},user2_id.eq.${miUsuarioId}`)
    .order('created_at', { ascending: false });

  const list = document.getElementById('chats-list');
  list.innerHTML = '';
  if (!data || data.length === 0) {
    list.innerHTML = '<p style="text-align:center;opacity:.3;margin-top:40px;">Aún no tienes conexiones.</p>';
    return;
  }
  data.forEach(m => {
    const otro = m.user1.id === miUsuarioId ? m.user2 : m.user1;
    const item = document.createElement('div');
    item.className = 'chat-item';
    item.onclick = () => abrirChat(m.id, otro);
    item.innerHTML = `
      <img src="${otro.foto_url}" class="chat-avatar">
      <div class="chat-body">
        <h4>${otro.nombre}</h4>
        <p id="last-msg-${m.id}">Toca para empezar a hablar...</p>
      </div>
    `;
    list.appendChild(item);
    cargarUltimoMsg(m.id);
  });
}

async function cargarUltimoMsg(matchId) {
  const { data } = await _supabase.from('mensajes').select('texto').eq('match_id', matchId).order('created_at', { ascending: false }).limit(1).single();
  if (data) document.getElementById('last-msg-' + matchId).textContent = data.texto;
}

async function abrirChat(matchId, otro) {
  currentChatMatchId = matchId;
  currentChatOtroId = otro.id;
  document.getElementById('cw-name').textContent = otro.nombre;
  document.getElementById('cw-img').src = otro.foto_url;
  document.getElementById('cw-msgs').innerHTML = '';
  show('scr-chat-win');
  const { data } = await _supabase.from('mensajes').select('*').eq('match_id', matchId).order('created_at', { ascending: true });
  if (data) data.forEach(msg => renderMsg(msg));
  scrollChat();
}

function renderMsg(m) {
  const box = document.getElementById('cw-msgs');
  const isMe = m.sender_id === miUsuarioId;
  const div = document.createElement('div');
  div.className = `m ${isMe ? 'm-out' : 'm-in'}`;
  div.innerHTML = `${escapeHTML(m.texto)}<span class="m-time">${new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>`;
  box.appendChild(div);
}

async function enviarMsg() {
  const txt = document.getElementById('cw-txt').value.trim();
  if (!txt) return;
  document.getElementById('cw-txt').value = '';
  const { error } = await _supabase.from('mensajes').insert({ match_id: currentChatMatchId, sender_id: miUsuarioId, texto: txt });
  if (error) toast("No se envió");
}

function scrollChat() { const area = document.getElementById('cw-msgs'); area.scrollTop = area.scrollHeight; }

function irAlChatMatch() { show('scr-chat-win'); abrirChat(currentChatMatchId, { id: currentChatOtroId, nombre: 'Nueva Conexión', foto_url: document.getElementById('ma-otro').src }); }

// ── NAVEGACIÓN ────────────────────────────────────────────────
function navGo(tab) {
  ['desc','chats','perfil'].forEach(t => {
    const el = document.getElementById('tab-' + t);
    if (el) el.style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.nbtn').forEach(b => b.classList.remove('on'));
  const btn = document.getElementById('nb-' + tab);
  if (btn) btn.classList.add('on');
  if (tab === 'chats') cargarMatches();
}

// ── UTILS ─────────────────────────────────────────────────────
function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('on')); document.getElementById(id).classList.add('on'); }
function toast(txt) { const t = document.getElementById('toast'); t.textContent = txt; t.classList.add('on'); setTimeout(() => t.classList.remove('on'), 2800); }
function escapeHTML(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function compartir() { navigator.share ? navigator.share({ title: 'ENLACE', url: 'https://enlace-app.vercel.app' }) : toast("URL copiada"); }

async function reportar() {
  if (!confirm("¿Reportar usuario?")) return;
  const { error } = await _supabase.from('reportes').insert({ reportador_id: miUsuarioId, reportado_id: currentChatOtroId, motivo: 'Reporte chat' });
  if (!error) { toast("Reportado."); show('scr-main'); }
}
</script>
</body>
</html>
