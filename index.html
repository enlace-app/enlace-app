<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>ENLACE v14 GOLD</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    /* TU DISEÑO ORIGINAL v14 */
    :root {
      --bg:#0A0A0F; --s1:#12121A; --s2:#1A1A26; --acc:#E8356D; --txt:#F0F0FF;
    }
    body { margin:0; background:var(--bg); color:var(--txt); font-family:'DM Sans', sans-serif; overflow:hidden; height:100vh; }
    
    /* Splash Reparado */
    #splash { 
      position:fixed; inset:0; background:var(--bg); 
      display:flex; flex-direction:column; align-items:center; justify-content:center; 
      z-index:9999; opacity:1; transition:0.5s; 
    }
    .logo-anim { font-family:'Syne', sans-serif; font-weight:800; font-size:48px; letter-spacing:-2px; color:var(--acc); }

    .screen { position:fixed; inset:0; display:none; flex-direction:column; background:var(--bg); }
    .screen.on { display:flex; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    /* Estilos de tus componentes */
    .xp-badge { background:rgba(232,53,109,0.15); color:var(--acc); padding:6px 14px; border-radius:20px; font-weight:600; font-size:12px; border:1px solid rgba(232,53,109,0.3); }
    .btn-main { background:var(--acc); color:white; border:none; padding:18px; border-radius:18px; font-weight:700; width:90%; cursor:pointer; font-size:16px; }
    input { background:var(--s2); border:1px solid rgba(255,255,255,0.05); padding:16px; border-radius:16px; color:white; margin:10px 0; width:85%; }
    
    .nav { position:fixed; bottom:0; width:100%; height:85px; background:rgba(18,18,26,0.9); backdrop-filter:blur(15px); display:none; justify-content:space-around; align-items:center; border-top:1px solid rgba(255,255,255,0.05); padding-bottom:env(safe-area-inset-bottom); }
    .nav.on { display:flex; }
    @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

    <div id="splash">
        <h1 class="logo-anim">ENLACE</h1>
        <div style="width:25px;height:25px;border:3px solid #222;border-top-color:var(--acc);border-radius:50%;animation:spin 1s linear infinite;margin-top:20px"></div>
    </div>

    <div id="auth" class="screen" style="justify-content:center; align-items:center;">
        <h1 style="font-family:Syne; font-size:32px;">Bienvenido</h1>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Contraseña">
        <button class="btn-main" onclick="handleAuth('login')">ENTRAR</button>
        <button onclick="handleAuth('reg')" style="background:none; border:none; color:#666; margin-top:20px">Registrarse</button>
        <p id="err" style="color:var(--acc); font-size:12px; margin-top:20px"></p>
    </div>

    <div id="main" class="screen">
        <header style="padding:20px; display:flex; justify-content:space-between; align-items:center">
            <span style="font-family:Syne; font-weight:800; color:var(--acc); font-size:22px">ENLACE</span>
            <div class="xp-badge" id="xp-val">100 XP</div>
        </header>
        <div style="flex:1; display:flex; align-items:center; justify-content:center; padding:20px">
            <div style="background:var(--s2); width:100%; height:80%; border-radius:35px; border:1px solid rgba(255,255,255,0.05); display:flex; align-items:center; justify-content:center">
                <p style="color:#444">Buscando conexiones...</p>
            </div>
        </div>
    </div>

    <nav id="navbar" class="nav">
        <div onclick="show('main')" style="font-size:28px">🔥</div>
        <div onclick="alert('Próximamente')" style="font-size:28px; opacity:0.3">💬</div>
        <div onclick="alert('Próximamente')" style="font-size:28px; opacity:0.3">👤</div>
    </nav>

<script>
    // 1. CONEXIÓN DIRECTA
    const SB_URL = "https://nvvebzpbupqrddxcvnzk.supabase.co";
    const SB_KEY = "Sb_publishable_DHkfYtA89Cb-MAIdq2TqqA_OVjmtvuq";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    // 2. MOTOR DE ARRANQUE "BYPASS"
    async function initApp() {
        // Si en 2.5 segundos no ha entrado, forzamos la pantalla de Auth
        const timer = setTimeout(() => {
            console.log("Forzando inicio...");
            exitSplash();
            show('auth');
        }, 2500);

        try {
            const { data: { session } } = await sb.auth.getSession();
            clearTimeout(timer);
            exitSplash();
            if (session) {
                cargarPerfil(session.user.id);
                show('main');
            } else {
                show('auth');
            }
        } catch (e) {
            exitSplash();
            show('auth');
        }
    }

    function exitSplash() {
        const s = document.getElementById('splash');
        s.style.opacity = '0';
        setTimeout(() => s.style.display = 'none', 500);
    }

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
        document.getElementById(id).classList.add('on');
        if(id === 'main') document.getElementById('navbar').classList.add('on');
        else document.getElementById('navbar').classList.remove('on');
    }

    async function cargarPerfil(uid) {
        const { data } = await sb.from('perfiles').select('puntos').eq('id', uid).single();
        if(data) document.getElementById('xp-val').innerText = data.puntos + ' XP';
    }

    async function handleAuth(type) {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const err = document.getElementById('err');
        
        err.innerText = "Conectando...";
        const { error } = (type === 'login') 
            ? await sb.auth.signInWithPassword({ email, password:pass })
            : await sb.auth.signUp({ email, password:pass });

        if(error) err.innerText = error.message;
        else location.reload();
    }

    window.onload = initApp;
</script>
</body>
</html>
